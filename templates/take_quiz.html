<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz - {{ topic }}</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #667eea, #764ba2);
      margin: 0;
      padding: 30px;
      color: #333;
      display: flex;
      justify-content: center;
      min-height: 100vh;
      align-items: center;
    }

    .container {
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(12px);
      border-radius: 20px;
      padding: 40px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.2);
      max-width: 850px;
      width: 100%;
      animation: fadeIn 0.7s ease-in-out;
      position: relative;
      overflow-y: auto;
      max-height: 90vh; /* so container scrolls if content is tall */
    }

    h2 {
      color: #2c3e50;
      font-size: 28px;
      text-align: center;
      margin-bottom: 20px;
    }

    /* Timer display - sticky at top right */
    #timer {
      position: fixed;
      top: 20px;
      right: 20px;
      font-weight: 700;
      font-size: 18px;
      color: #764ba2;
      background: #e0dffb;
      padding: 8px 14px;
      border-radius: 12px;
      box-shadow: 0 4px 8px rgba(118,75,162,0.3);
      user-select: none;
      z-index: 9999;
      cursor: default;
    }

    /* Progress Bar */
    .progress-bar {
      background: #eee;
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 25px;
      height: 12px;
    }

    .progress {
      height: 100%;
      background: linear-gradient(90deg, #667eea, #764ba2);
      width: 0%;
      transition: width 0.4s ease;
    }

    .question-card {
      background: #fff;
      border-radius: 16px;
      padding: 22px;
      margin-bottom: 20px;
      border: 1px solid #e0e0e0;
      transition: all 0.3s ease;
    }

    .question-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 10px 25px rgba(0,0,0,0.08);
    }

    .question-card p {
      font-weight: 600;
      margin-bottom: 15px;
      font-size: 16px;
    }

    /* Option Buttons */
    .options input {
      display: none;
    }

    .option-label {
      display: block;
      margin-bottom: 12px;
      padding: 14px 18px;
      border-radius: 12px;
      border: 2px solid #ddd;
      cursor: pointer;
      transition: all 0.3s ease;
      font-weight: 500;
      background: #fafafa;
    }

    .option-label:hover {
      border-color: #667eea;
      background: #f0f3ff;
    }

    .options input:checked + .option-label {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #fff;
      border-color: transparent;
      font-weight: 600;
      box-shadow: 0 6px 15px rgba(102,126,234,0.4);
    }

    /* Submit button */
    button.submit-btn {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #fff;
      padding: 14px 28px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 700;
      font-size: 17px;
      display: block;
      margin: 30px auto 0 auto;
      transition: transform 0.25s ease, box-shadow 0.25s ease;
    }

    button.submit-btn:hover {
      transform: translateY(-2px) scale(1.03);
      box-shadow: 0 8px 20px rgba(118,75,162,0.4);
    }

    a.back {
      display: inline-block;
      margin-top: 20px;
      color: #667eea;
      text-decoration: none;
      font-weight: 600;
      text-align: center;
      width: 100%;
      transition: color 0.3s ease;
    }

    a.back:hover {
      color: #764ba2;
      text-decoration: underline;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 600px) {
      body { padding: 12px; }
      .container { padding: 20px 16px; max-height: none; }
      h2 { font-size: 22px; }
      #timer {
        position: static;
        display: inline-block;
        margin: 0 auto 16px;
        width: auto;
      }
      body { display: block; }
      .container { margin: 0 auto; }
    }
  </style>
  <link rel="stylesheet" href="{{ url_for('static', filename='theme-override.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='responsive-fix.css') }}">
</head>
<body>
  <div id="timer">Time Left: <span id="time">--:--</span></div>

  <div class="container">
    <h2>📝 Quiz: {{ topic }}</h2>

    <!-- Progress bar -->
    <div class="progress-bar">
      <div class="progress" id="progress"></div>
    </div>

    <form id="quizForm" method="POST" action="{{ url_for('take_quiz', topic=topic) }}">
      {% for q in questions %}
        <div class="question-card">
          <p><strong>Q{{ loop.index }}.</strong> {{ q.question }}</p>
          <div class="options">
            {% if q.option_a %}
              <input type="radio" id="{{ q.id }}-A" name="{{ q.id }}" value="A" required>
              <label for="{{ q.id }}-A" class="option-label">A. {{ q.option_a }}</label>
            {% endif %}
            {% if q.option_b %}
              <input type="radio" id="{{ q.id }}-B" name="{{ q.id }}" value="B">
              <label for="{{ q.id }}-B" class="option-label">B. {{ q.option_b }}</label>
            {% endif %}
            {% if q.option_c %}
              <input type="radio" id="{{ q.id }}-C" name="{{ q.id }}" value="C">
              <label for="{{ q.id }}-C" class="option-label">C. {{ q.option_c }}</label>
            {% endif %}
            {% if q.option_d %}
              <input type="radio" id="{{ q.id }}-D" name="{{ q.id }}" value="D">
              <label for="{{ q.id }}-D" class="option-label">D. {{ q.option_d }}</label>
            {% endif %}
          </div>
        </div>
      {% endfor %}

      <button type="submit" class="submit-btn">🚀 Submit Quiz</button>
    </form>

    <p><a class="back" href="{{ url_for('student_dashboard') }}">← Back to Dashboard</a></p>
  </div>

  <script>
    // Progress bar logic
    const totalQuestions = {{ questions|length }};
    const progress = document.getElementById('progress');
    const inputs = document.querySelectorAll('input[type="radio"]');

    function updateProgress() {
      const answered = new Set();
      inputs.forEach(input => {
        if (input.checked) answered.add(input.name);
      });
      const percent = (answered.size / totalQuestions) * 100;
      progress.style.width = percent + "%";
    }

    inputs.forEach(input => {
      input.addEventListener('change', updateProgress);
    });

    // Timer countdown (example 15 minutes)
    let timeLeft = 15 * 60; // 15 minutes in seconds
    const timeDisplay = document.getElementById('time');

    function formatTime(seconds) {
      const mins = Math.floor(seconds / 60);
      const secs = seconds % 60;
      return `${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
    }

    function countdown() {
      if(timeLeft >= 0) {
        timeDisplay.textContent = formatTime(timeLeft);
        timeLeft--;
        setTimeout(countdown, 1000);
      } else {
        alert("⏰ Time's up! The quiz will be submitted automatically.");
        document.querySelector('form').submit();
      }
    }
    countdown();

    // Submit popup confirmation
    document.getElementById("quizForm").addEventListener("submit", function(e) {
      e.preventDefault();
      if(confirm("✅ Are you sure you want to submit the quiz?")) {
        this.submit(); // Server redirects to result page on success
      }
    });
  </script>
<script src="{{ url_for('static', filename='theme-toggle.js') }}"></script>
</body>
</html>
