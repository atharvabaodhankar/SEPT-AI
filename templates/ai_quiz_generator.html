<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Quiz Generator</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='theme-override.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='responsive-fix.css') }}">
</head>
<body class="p-4">
    <h2 class="mb-3">🤖 AI Quiz Generator</h2>

    <form method="POST" class="mb-4">
        <div class="mb-3">
            <label for="quiz_material" class="form-label">Paste Learning Material</label>
            <textarea name="quiz_material" id="quiz_material" rows="5" class="form-control"></textarea>
        </div>
        <button type="submit" class="btn btn-primary">Generate Quiz</button>
    </form>

    {% if quiz %}
        <h3>Generated Quiz</h3>
        <ul class="list-group">
            {% for q in quiz %}
                <li class="list-group-item">
                    <strong>Q: {{ q.question }}</strong>
                    <ul>
                        {% for option in q.options %}
                            <li>{{ option }}</li>
                        {% endfor %}
                    </ul>
                    <em>Answer: {{ q.answer }}</em>
                </li>
            {% endfor %}
        </ul>
    {% endif %}
<script src="{{ url_for('static', filename='theme-toggle.js') }}"></script>
</body>
</html>
