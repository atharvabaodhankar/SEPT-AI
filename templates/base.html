<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}SEPT{% endblock %}</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Bootstrap -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b, #0f172a);
      color: #f1f5f9;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Navbar */
    .navbar {
      background: rgba(15, 23, 42, 0.8);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      padding: 0.8rem 1.5rem;
    }
    .navbar-brand {
      font-weight: 700;
      font-size: 1.4rem;
      color: #38bdf8 !important;
      letter-spacing: 0.5px;
    }
    .nav-link {
      color: #e2e8f0 !important;
      font-weight: 500;
      margin-left: 12px;
      transition: 0.3s;
    }
    .nav-link:hover {
      color: #38bdf8 !important;
    }

    /* Main Container */
    main.container {
      flex: 1;
      padding: 2rem 0;
    }

    /* Glass Card */
    .content-card {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      padding: 30px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.4);
      backdrop-filter: blur(15px);
      transition: transform 0.25s ease, box-shadow 0.25s ease;
    }
    .content-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 35px rgba(0,0,0,0.55);
    }

    /* Buttons */
    .btn-primary {
      background: linear-gradient(135deg, #2563eb, #38bdf8);
      border: none;
      border-radius: 10px;
      font-weight: 600;
      padding: 10px 20px;
      transition: 0.3s;
    }
    .btn-primary:hover {
      background: linear-gradient(135deg, #1d4ed8, #0ea5e9);
      transform: translateY(-2px);
    }

    .btn-danger {
      border-radius: 10px;
      font-weight: 500;
    }

    /* Headings */
    h1, h2, h3 {
      font-weight: 700;
      color: #f8fafc;
    }
    h2 {
      border-left: 4px solid #38bdf8;
      padding-left: 10px;
    }

    /* Footer */
    footer {
      text-align: center;
      padding: 15px;
      background: rgba(15, 23, 42, 0.8);
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      font-size: 14px;
      color: #94a3b8;
      backdrop-filter: blur(12px);
    }
  </style>
  <link rel="stylesheet" href="{{ url_for('static', filename='theme-override.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='responsive-fix.css') }}">
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg">
    <a class="navbar-brand" href="/"><i class="fa-solid fa-graduation-cap"></i> Adaptive Learning</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        {% if session.get('user_id') %}
          <li class="nav-item"><a class="nav-link" href="/logout"><i class="fa-solid fa-right-from-bracket"></i> Logout</a></li>
        {% else %}
          <li class="nav-item"><a class="nav-link" href="/login"><i class="fa-solid fa-right-to-bracket"></i> Login</a></li>
          <li class="nav-item"><a class="nav-link" href="/register"><i class="fa-solid fa-user-plus"></i> Register</a></li>
        {% endif %}
      </ul>
    </div>
  </nav>

  <!-- Page Content -->
  <main class="container">
    <div class="content-card">
      {% block content %}{% endblock %}
    </div>
  </main>

  <!-- Footer -->
  <footer>
    <p>🚀 Adaptive Learning © 2025 | Built for the Future of Education</p>
  </footer>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="{{ url_for('static', filename='theme-toggle.js') }}"></script>
</body>
</html>
