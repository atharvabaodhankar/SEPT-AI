<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Add Coding Challenge</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  body {
    font-family: 'Inter', sans-serif;
    background: linear-gradient(135deg, #667eea, #764ba2);
    margin: 0;
    padding: 40px 16px;
    display: flex;
    justify-content: center;
    color: #333;
  }

  .container {
    background: rgba(255,255,255,0.95);
    backdrop-filter: blur(10px);
    border-radius: 20px;
    padding: 40px 50px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.2);
    max-width: 640px;
    width: 100%;
    animation: fadeIn 0.7s ease-in-out;
  }

  h2 { font-size: 26px; color: #2c3e50; margin-bottom: 24px; text-align:center; }

  label { display:block; font-weight:600; margin: 14px 0 6px; font-size: 14px; }

  input, select, textarea {
    width: 100%;
    padding: 12px 14px;
    border-radius: 10px;
    border: 2px solid #ddd;
    font-family: inherit;
    font-size: 14px;
    box-sizing: border-box;
  }

  input:focus, select:focus, textarea:focus { border-color: #667eea; outline: none; }

  textarea { resize: vertical; min-height: 70px; }

  .row2 { display:flex; gap:14px; }
  .row2 > div { flex:1; }

  button {
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: #fff;
    padding: 14px 28px;
    border: none;
    border-radius: 12px;
    font-weight: 700;
    font-size: 16px;
    cursor: pointer;
    transition: transform 0.25s ease, box-shadow 0.25s ease;
    margin-top: 24px;
    width: 100%;
  }

  button:hover { transform: translateY(-2px) scale(1.02); box-shadow: 0 8px 20px rgba(118,75,162,0.4); }

  a.back {
    display: inline-block;
    margin-top: 20px;
    color: #667eea;
    font-weight: 600;
    text-decoration: none;
  }
  a.back:hover { color: #764ba2; text-decoration: underline; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(20px);} to { opacity: 1; transform: translateY(0);} }
</style>
  <link rel="stylesheet" href="{{ url_for('static', filename='theme-override.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='responsive-fix.css') }}">
</head>
<body>
  <div class="container">
    <h2>💻 Add Coding Challenge</h2>

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <p style="text-align:center;color:#764ba2;font-weight:600">{{ messages[0] }}</p>
      {% endif %}
    {% endwith %}

    <form action="{{ url_for('add_challenge') }}" method="post">
      <label>Title</label>
      <input type="text" name="title" placeholder="e.g. Sum of Two Numbers" required>

      <div class="row2">
        <div>
          <label>Subject</label>
          <select name="subject" required>
            <option value="Python">Python</option>
            <option value="Java">Java</option>
            <option value="C">C</option>
            <option value="C++">C++</option>
          </select>
        </div>
        <div>
          <label>Language</label>
          <select name="language" required>
            <option value="Python">Python</option>
            <option value="Java">Java</option>
            <option value="C">C</option>
            <option value="C++">C++</option>
          </select>
        </div>
      </div>

      <label>Difficulty</label>
      <select name="difficulty" required>
        <option value="Easy">Easy</option>
        <option value="Medium">Medium</option>
        <option value="Hard">Hard</option>
      </select>

      <label>Description</label>
      <textarea name="description" placeholder="What should the student's program do?" required></textarea>

      <div class="row2">
        <div>
          <label>Input Format</label>
          <textarea name="input_format" placeholder="e.g. Two integers a and b"></textarea>
        </div>
        <div>
          <label>Output Format</label>
          <textarea name="output_format" placeholder="e.g. Single integer a + b"></textarea>
        </div>
      </div>

      <div class="row2">
        <div>
          <label>Sample Input</label>
          <input type="text" name="sample_input" placeholder="3 4">
        </div>
        <div>
          <label>Sample Output</label>
          <input type="text" name="sample_output" placeholder="7">
        </div>
      </div>

      <label>Expected Output (used for auto-checking)</label>
      <input type="text" name="expected_output" placeholder="7" required>

      <button type="submit">Add Challenge</button>
    </form>
    <a class="back" href="{{ url_for('teacher_dashboard') }}">← Back to Dashboard</a>
  </div>
<script src="{{ url_for('static', filename='theme-toggle.js') }}"></script>
</body>
</html>
