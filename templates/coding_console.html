<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coding Console - {{ topic }}</title>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" integrity="sha512-ZkSzO+L2G9kQYdT0PXlE6oEgfJZ8pk/06NqUJuOdZ3sbmN7KK/5PvF07iSxTt9YjJxFiqf5Oe0V0v0r9iY/nXA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <style>
    body {
      font-family: 'Fira Code', monospace;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      color: #fff;
    }

    .container {
      width: 95%;
      max-width: 1000px;
      background: rgba(0,0,0,0.85);
      border-radius: 20px;
      padding: 30px;
      box-shadow: 0 15px 50px rgba(0,0,0,0.7);
      animation: fadeIn 0.8s ease;
    }

    h2 {
      text-align: center;
      margin-bottom: 25px;
      font-size: 32px;
      font-weight: 700;
      background: linear-gradient(90deg, #667eea, #764ba2);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* Coding Score Progress Bar */
    .score-wrapper {
      margin-bottom: 20px;
    }
    .score-bar {
      width: 100%;
      height: 25px;
      background: rgba(255,255,255,0.1);
      border-radius: 12px;
      overflow: hidden;
    }
    .score-fill {
      height: 100%;
      width: {{ coding_score|default(0) }}%;
      background: linear-gradient(90deg, #10b981, #34d399);
      text-align: center;
      line-height: 25px;
      font-weight: 600;
      transition: width 0.4s ease;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    select {
      padding: 12px 15px;
      font-size: 15px;
      border-radius: 10px;
      border: none;
      width: 200px;
      background: #1f2937;
      color: #fff;
      outline: none;
    }

    .editor {
      position: relative;
      display: flex;
      background: #1f2937;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 5px 15px rgba(0,0,0,0.3);
    }

    .line-numbers {
      padding: 15px;
      background: #111827;
      color: #9ca3af;
      text-align: right;
      user-select: none;
      font-size: 14px;
    }

    textarea {
      flex: 1;
      padding: 15px;
      border: none;
      outline: none;
      resize: vertical;
      font-family: 'Fira Code', monospace;
      font-size: 14px;
      background: #1f2937;
      color: #f9fafb;
    }

    button {
      background: linear-gradient(135deg, #667eea, #764ba2);
      border: none;
      color: #fff;
      font-weight: 700;
      padding: 12px 25px;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.3s ease;
      align-self: flex-start;
      margin-top: 10px;
    }

    button:hover {
      transform: translateY(-3px) scale(1.05);
      box-shadow: 0 8px 25px rgba(102,126,234,0.5);
    }

    .output {
      margin-top: 25px;
    }

    .output h3 {
      font-size: 20px;
      margin-bottom: 10px;
      color: #fff;
    }

    .output pre {
      background: #111827;
      padding: 20px;
      border-radius: 12px;
      overflow-x: auto;
      font-size: 14px;
      color: #34d399;
    }

    a {
      display: inline-block;
      margin-top: 20px;
      color: #fff;
      text-decoration: none;
      font-weight: 600;
      transition: color 0.3s ease;
    }

    a:hover {
      color: #ffd700;
      text-decoration: underline;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
  <link rel="stylesheet" href="{{ url_for('static', filename='theme-override.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='responsive-fix.css') }}">
</head>
<body>
  <div class="container">
    <h2>🖥️ Coding Console: {{ topic }}</h2>

    <!-- Coding Score -->
    <div class="score-wrapper">
      <div class="score-bar">
        <div class="score-fill">{{ coding_score|default(0) }}%</div>
      </div>
    </div>

    <form method="POST">
      <select name="language">
        <option value="python" {% if request.form.language=='python' %}selected{% endif %}>Python</option>
        <option value="c" {% if request.form.language=='c' %}selected{% endif %}>C</option>
        <option value="cpp" {% if request.form.language=='cpp' %}selected{% endif %}>C++</option>
        <option value="java" {% if request.form.language=='java' %}selected{% endif %}>Java</option>
      </select>

      <div class="editor">
        <div class="line-numbers" id="lineNumbers">1</div>
        <textarea id="codeArea" name="code" placeholder="Write your code here..." required>{{ request.form.code or '' }}</textarea>
      </div>

      <button type="submit">Run Code</button>
    </form>

    {% if output %}
      <div class="output">
        <h3>OUTPUT</h3>
        <pre>{{ output }}</pre>
      </div>
    {% endif %}

    <p><a href="{{ url_for('student_dashboard') }}">← Back to Dashboard</a></p>
  </div>

  <script>
    const codeArea = document.getElementById('codeArea');
    const lineNumbers = document.getElementById('lineNumbers');

    function updateLineNumbers() {
      const lines = codeArea.value.split("\n").length;
      lineNumbers.innerHTML = Array.from({length: lines}, (_, i) => i + 1).join("<br>");
    }

    codeArea.addEventListener('input', updateLineNumbers);
    window.onload = updateLineNumbers;
  </script>
<script src="{{ url_for('static', filename='theme-toggle.js') }}"></script>
</body>
</html>
