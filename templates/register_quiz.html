<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register New Quiz</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: #fff;
      font-family: 'Poppins', sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .container {
      max-width: 600px;
      background: rgba(255, 255, 255, 0.05);
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.3);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.1);
    }
    h2 {
      font-weight: 700;
      text-align: center;
      margin-bottom: 30px;
      background: linear-gradient(90deg, #4facfe, #00f2fe);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .form-control {
      background: rgba(255,255,255,0.1);
      border: none;
      border-radius: 12px;
      color: #fff;
      padding: 12px 15px;
      transition: all 0.3s ease;
    }
    .form-control:focus {
      background: rgba(52,211,153,0.1);
      box-shadow: 0 0 10px rgba(52,211,153,0.3);
      color: #fff;
    }
    .btn-primary {
      background: #4facfe;
      border: none;
      border-radius: 12px;
      padding: 10px 25px;
      font-weight: 600;
      transition: all 0.3s ease;
    }
    .btn-primary:hover {
      background: #00f2fe;
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(0,242,254,0.4);
    }
    .btn-secondary {
      border-radius: 12px;
      padding: 10px 25px;
      background: rgba(255,255,255,0.1);
      color: #fff;
      border: none;
      transition: all 0.3s ease;
    }
    .btn-secondary:hover {
      background: rgba(255,255,255,0.2);
      transform: translateY(-2px);
    }
    label {
      font-weight: 500;
    }
  </style>
  <link rel="stylesheet" href="{{ url_for('static', filename='theme-override.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='responsive-fix.css') }}">
</head>
<body>
<div class="container">
  <h2>Register New Quiz</h2>
  <form method="POST" action="{{ url_for('register_quiz') }}">
    <div class="mb-3">
      <label for="topic" class="form-label">Quiz Topic</label>
      <input type="text" class="form-control" id="topic" name="topic" placeholder="Enter quiz topic" required>
    </div>
    <div class="mb-3">
      <label for="num_questions" class="form-label">Number of Questions</label>
      <input type="number" class="form-control" id="num_questions" name="num_questions" placeholder="e.g. 10" required>
    </div>
    <div class="mb-3">
      <label for="expected_output" class="form-label">Expected Output (optional)</label>
      <textarea class="form-control" id="expected_output" name="expected_output" placeholder="Enter expected output"></textarea>
    </div>
    <div class="d-flex justify-content-center">
      <button type="submit" class="btn btn-primary me-3">Register Quiz</button>
      <a href="{{ url_for('teacher_dashboard') }}" class="btn btn-secondary">Back</a>
    </div>
  </form>
</div>
<script src="{{ url_for('static', filename='theme-toggle.js') }}"></script>
</body>
</html>
