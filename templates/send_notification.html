<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Send Notification</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  body {
    font-family: 'Inter', sans-serif;
    background: linear-gradient(135deg, #667eea, #764ba2);
    margin: 0;
    padding: 40px 16px;
    display: flex;
    justify-content: center;
    color: #333;
  }

  .container {
    background: rgba(255,255,255,0.95);
    backdrop-filter: blur(10px);
    border-radius: 20px;
    padding: 40px 50px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.2);
    max-width: 640px;
    width: 100%;
    animation: fadeIn 0.7s ease-in-out;
  }

  h2 { font-size: 26px; color: #2c3e50; margin-bottom: 24px; text-align:center; }

  label { display:block; font-weight:600; margin: 14px 0 6px; font-size: 14px; }

  input, select, textarea {
    width: 100%;
    padding: 12px 14px;
    border-radius: 10px;
    border: 2px solid #ddd;
    font-family: inherit;
    font-size: 14px;
    box-sizing: border-box;
  }

  input:focus, select:focus, textarea:focus { border-color: #667eea; outline: none; }

  textarea { resize: vertical; min-height: 80px; }

  .checkbox-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin: 14px 0 6px;
  }
  .checkbox-row input { width: auto; }
  .checkbox-row label { margin: 0; font-weight: 600; }

  .student-list {
    max-height: 260px;
    overflow-y: auto;
    border: 2px solid #ddd;
    border-radius: 10px;
    padding: 10px 14px;
    margin-top: 6px;
  }
  .student-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 6px 0;
    font-size: 14px;
  }
  .student-item input { width: auto; }

  button {
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: #fff;
    padding: 14px 28px;
    border: none;
    border-radius: 12px;
    font-weight: 700;
    font-size: 16px;
    cursor: pointer;
    transition: transform 0.25s ease, box-shadow 0.25s ease;
    margin-top: 24px;
    width: 100%;
  }
  button:hover { transform: translateY(-2px); box-shadow: 0 10px 24px rgba(0,0,0,0.25); }

  .back-link {
    display: block;
    text-align: center;
    margin-top: 18px;
    color: #667eea;
    text-decoration: none;
    font-weight: 600;
    font-size: 14px;
  }
  .back-link:hover { text-decoration: underline; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
  <link rel="stylesheet" href="{{ url_for('static', filename='responsive-fix.css') }}">
</head>
<body>

<div class="container">
  <h2>🔔 Send Notification</h2>

  {% with messages = get_flashed_messages() %}
    {% if messages %}
      {% for msg in messages %}
        <p style="color:#c0392b; font-weight:600; text-align:center;">{{ msg }}</p>
      {% endfor %}
    {% endif %}
  {% endwith %}

  <form method="POST">
    <label for="title">Title</label>
    <input type="text" id="title" name="title" placeholder="e.g. New Quiz Available" required>

    <label for="body">Message</label>
    <textarea id="body" name="body" placeholder="Write your announcement here..."></textarea>

    <div class="checkbox-row">
      <input type="checkbox" id="send_to_all" name="send_to_all" onchange="toggleStudentList()">
      <label for="send_to_all">Send to all students</label>
    </div>

    <label id="studentsLabel">Select students</label>
    <div class="student-list" id="studentList">
      {% for s in students %}
        <div class="student-item">
          <input type="checkbox" id="student_{{ s.id }}" name="student_ids" value="{{ s.id }}">
          <label for="student_{{ s.id }}" style="font-weight:400;">{{ s.username }}</label>
        </div>
      {% else %}
        <p style="font-size:13px; color:#888;">No students found.</p>
      {% endfor %}
    </div>

    <button type="submit"><i class="fa-solid fa-paper-plane"></i> Send Notification</button>
  </form>

  <a href="{{ url_for('teacher_dashboard') }}" class="back-link">← Back to Dashboard</a>
</div>

<script>
function toggleStudentList() {
  var checked = document.getElementById('send_to_all').checked;
  document.getElementById('studentList').style.display = checked ? 'none' : 'block';
  document.getElementById('studentsLabel').style.display = checked ? 'none' : 'block';
}
</script>

</body>
</html>
