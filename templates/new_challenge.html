<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"><title>New Challenge</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <style>body{font-family:Poppins,sans-serif;background:linear-gradient(135deg,#1f2937,#111827);color:#f9fafb}
  .card{background:rgba(255,255,255,.08);border-radius:16px;padding:20px}</style>
  <link rel="stylesheet" href="{{ url_for('static', filename='theme-override.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='responsive-fix.css') }}">
</head>
<body class="container py-4">
  <div class="card">
    <h3>Create Challenge</h3>
    <form method="post">
      <div class="row g-3">
        <div class="col-md-6">
          <label class="form-label">Title</label>
          <input name="title" class="form-control" required>
        </div>
        <div class="col-md-3">
          <label class="form-label">Difficulty</label>
          <select name="difficulty" class="form-select">
            <option>Easy</option><option>Medium</option><option>Hard</option>
          </select>
        </div>
        <div class="col-md-3">
          <label class="form-label">Tags</label>
          <input name="tags" class="form-control" placeholder="arrays,strings">
        </div>
        <div class="col-12">
          <label class="form-label">Description</label>
          <textarea name="description" rows="5" class="form-control" required></textarea>
        </div>
        <div class="col-md-6">
          <label class="form-label">Input Format</label>
          <textarea name="input_format" rows="3" class="form-control"></textarea>
        </div>
        <div class="col-md-6">
          <label class="form-label">Output Format</label>
          <textarea name="output_format" rows="3" class="form-control"></textarea>
        </div>
        <div class="col-md-6">
          <label class="form-label">Sample Input</label>
          <textarea name="sample_input" rows="3" class="form-control"></textarea>
        </div>
        <div class="col-md-6">
          <label class="form-label">Sample Output</label>
          <textarea name="sample_output" rows="3" class="form-control"></textarea>
        </div>
        <div class="col-md-6">
          <label class="form-label">Subject (optional)</label>
          <input name="subject" class="form-control">
        </div>
        <div class="col-12">
          <label class="form-label">Test Cases (JSON)</label>
          <textarea name="test_cases" rows="6" class="form-control" placeholder='[{"input":"2 3","output":"5"}]' required></textarea>
        </div>
      </div>
      <div class="mt-3">
        <button class="btn btn-primary">Create</button>
        <a href="{{ url_for('challenges') }}" class="btn btn-secondary">Back</a>
      </div>
    </form>
  </div>
<script src="{{ url_for('static', filename='theme-toggle.js') }}"></script>
</body>
</html>
