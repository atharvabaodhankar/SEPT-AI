<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Submissions</title>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Fira Code', monospace;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color: #fff;
      margin: 0;
      padding: 0;
    }
    .container {
      width: 90%;
      max-width: 1000px;
      margin: auto;
      padding: 30px;
    }
    h1 {
      text-align: center;
      margin-bottom: 30px;
      font-size: 32px;
      background: linear-gradient(90deg, #667eea, #764ba2);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      background: rgba(0,0,0,0.8);
      border-radius: 15px;
      overflow: hidden;
    }
    table th, table td {
      padding: 12px 15px;
      border-bottom: 1px solid #444;
      text-align: center;
    }
    table th {
      background: #111827;
    }
    tr:hover {
      background: rgba(255,255,255,0.05);
    }
    a {
      display: block;
      text-align: center;
      margin-top: 20px;
      color: #ffd700;
      text-decoration: underline;
    }
  </style>
  <link rel="stylesheet" href="{{ url_for('static', filename='theme-override.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='responsive-fix.css') }}">
</head>
<body>
  <div class="container">
    <h1>📜 My Submissions</h1>
    <table>
      <thead>
        <tr>
          <th>Challenge</th>
          <th>Language</th>
          <th>Status</th>
          <th>Score</th>
          <th>Submitted At</th>
        </tr>
      </thead>
      <tbody>
        {% for s in submissions %}
          <tr>
            <td>{{ s.title }}</td>
            <td>{{ s.language }}</td>
            <td>{{ s.status }}</td>
            <td>{{ s.score }}</td>
            <td>{{ s.submitted_at }}</td>
          </tr>
        {% endfor %}
      </tbody>
    </table>

    <a href="{{ url_for('student_dashboard') }}">← Back to Dashboard</a>
  </div>
<script src="{{ url_for('static', filename='theme-toggle.js') }}"></script>
</body>
</html>
